<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自動詞・他動詞 神経衰弱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --card-w: 200px;
    --card-h: 140px;
    --font-size: 30px;
    --bg: #f0f4ff;
    --panel-bg: #1a237e;
    --red: #e53935;
    --blue: #1e88e5;
    --green: #43a047;
    --gold: #f9a825;
    --card-back: #3949ab;
    --matched: #c8e6c9;
    --shadow: 0 4px 16px rgba(0,0,0,0.13);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); min-height: 100vh; }

  /* ===== 先生レイアウト ===== */
  .teacher-layout { display: flex; min-height: 100vh; }

  .left-panel {
    width: 250px; min-width: 250px;
    background: var(--panel-bg);
    color: white;
    display: flex; flex-direction: column;
    padding: 14px 12px; gap: 12px;
    overflow-y: auto;
  }

  .panel-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 15px; color: #c5cae9;
    text-align: center; letter-spacing: 1px;
    padding-bottom: 10px;
    border-bottom: 1px solid #3949ab;
  }

  .ctrl-group { display: flex; flex-direction: column; gap: 5px; }
  .ctrl-label { font-size: 10px; color: #9fa8da; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 4px; }

  button { font-family: 'Noto Sans JP', sans-serif; border: none; cursor: pointer; border-radius: 8px; font-weight: 700; transition: all 0.15s; }

  .btn-count { background: #3949ab; color: #c5cae9; padding: 5px 9px; font-size: 12px; }
  .btn-count.active { background: #7986cb; color: white; }

  .btn-mode { padding: 6px 8px; font-size: 12px; background: #3949ab; color: #c5cae9; flex: 1; }
  .btn-mode.active-solo { background: var(--green); color: white; }
  .btn-mode.active-red  { background: var(--red);   color: white; }
  .btn-mode.active-blue { background: var(--blue);  color: white; }

  .btn-wide { width: 100%; padding: 8px; font-size: 13px; border-radius: 8px; }
  .btn-reset   { background: #ff7043; color: white; }
  .btn-reset:hover { background: #e64a19; }
  .btn-fs      { background: #5c6bc0; color: white; }
  .btn-student { background: var(--gold); color: #1a237e; font-weight: 900; }
  .btn-student:hover { background: #f57f17; color: white; }

  .slider-row { display: flex; align-items: center; gap: 6px; }
  input[type=range] { flex: 1; accent-color: #7986cb; }
  .slider-val { font-size: 11px; color: #9fa8da; width: 28px; text-align: right; }

  .switch-wrap { display: flex; align-items: center; justify-content: space-between; }
  .switch-wrap > span { font-size: 12px; color: #c5cae9; }
  .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .switch input { display: none; }
  .slider-sw { position: absolute; inset: 0; background: #3949ab; border-radius: 22px; cursor: pointer; transition: .3s; }
  .slider-sw::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: .3s; }
  .switch input:checked + .slider-sw { background: #7986cb; }
  .switch input:checked + .slider-sw::before { transform: translateX(18px); }

  .divider { border: none; border-top: 1px solid #3949ab; }

  /* 右パネル */
  .right-panel { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px; overflow-y: auto; }

  /* ===== 生徒レイアウト ===== */
  .student-layout { display: flex; flex-direction: column; align-items: center; padding: 16px; min-height: 100vh; }
  /* 生徒画面のスコア（カードサイズ連動） */
  #student-layout .scoreboard { gap: 30px; margin-bottom: 20px; }
  #student-layout .score-box { padding: calc(var(--card-h) * 0.1) calc(var(--card-w) * 0.2); min-width: calc(var(--card-w) * 1.3); border-radius: 16px; }
  #student-layout .score-name { font-size: calc(var(--card-h) * 0.18); }
  #student-layout .score-num { font-size: calc(var(--card-h) * 0.7); line-height: 1; }
  #student-layout .turn-label { font-size: calc(var(--card-h) * 0.12); }

  /* ===== 共通部品 ===== */
  h1 { font-family: 'Kaisei Decol', serif; font-size: 22px; color: #1a237e; margin-bottom: 10px; text-align: center; letter-spacing: 2px; }

  .scoreboard { display: flex; gap: 14px; margin-bottom: 8px; justify-content: center; }
  .score-box { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 8px 18px; text-align: center; min-width: 95px; border: 3px solid transparent; transition: border-color .3s; }
  .score-box.current-turn { border-color: var(--gold); box-shadow: 0 0 10px rgba(249,168,37,.4); }
  .score-name { font-size: 12px; font-weight: 700; }
  .score-num  { font-size: 28px; font-weight: 900; line-height: 1.1; }
  .turn-label { font-size: 10px; color: #999; }
  .score-box.solo      .score-name, .score-box.solo      .score-num { color: var(--green); }
  .score-box.team-red  .score-name, .score-box.team-red  .score-num { color: var(--red); }
  .score-box.team-blue .score-name, .score-box.team-blue .score-num { color: var(--blue); }


  .grid { display: grid; gap: 10px; justify-content: center; justify-items: center; }

  /* カード番号（裏面中央・カードサイズ連動） */
  .card-num {
    position: static;
    font-size: calc(var(--card-h) * 0.55);
    font-weight: 900;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    text-align: center;
  }

  /* ===== カード ===== */
  .card-wrap { width: var(--card-w); height: var(--card-h); perspective: 800px; cursor: pointer; }
  .card-wrap.readonly { cursor: default; }

  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .4s cubic-bezier(.4,0,.2,1); border-radius: var(--radius); }
  .card-wrap.flipped .card-inner,
  .card-wrap.matched  .card-inner,
  .card-wrap.matched-red  .card-inner,
  .card-wrap.matched-blue .card-inner { transform: rotateY(180deg); }

  .card-face { position: absolute; width: 100%; height: 100%; border-radius: var(--radius); backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: var(--shadow); user-select: none; }

  .card-back-face { background: var(--card-back); display: flex; align-items: center; justify-content: center; }

  .card-front-face { background: white; transform: rotateY(180deg); border: 2px solid #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 8px; gap: 4px; }
  .card-wrap.matched      .card-front-face { background: var(--matched); border-color: var(--green); }
  .card-wrap.matched-red  .card-front-face { background: #ffebee; border-color: var(--red); }
  .card-wrap.matched-blue .card-front-face { background: #e3f2fd; border-color: var(--blue); }

  .card-type { font-size: calc(var(--card-h) * 0.12); font-weight: 700; padding: 2px 10px; border-radius: 4px; }
  .card-type.hidden-label { visibility: hidden; }
  .jido .card-type { background: #e3f2fd; color: var(--blue); }
  .tado .card-type { background: #fce4ec; color: var(--red); }

  .card-word { flex: 1; display: flex; align-items: center; justify-content: center; font-size: var(--font-size); font-weight: 700; color: #1a1a2e; text-align: center; line-height: 1.3; }

  rt { font-size: 0.5em; color: #888; }

  /* ===== オーバーレイ ===== */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100; align-items: center; justify-content: center; }
  .overlay.show { display: flex; }
  .result-box { background: white; border-radius: 20px; padding: 36px 44px; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,.3); animation: pop .4s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
  .result-title  { font-family: 'Kaisei Decol', serif; font-size: 30px; color: #1a237e; margin-bottom: 8px; }
  .result-detail { font-size: 15px; color: #555; margin-bottom: 18px; line-height: 1.8; }
  .btn-play-again { background: #3949ab; color: white; padding: 10px 26px; font-size: 14px; border-radius: 10px; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; }

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .shake { animation: shake .3s ease; }
</style>
</head>
<body>

<!-- 先生画面 -->
<div class="teacher-layout" id="teacher-layout" style="display:none">
  <div class="left-panel">
    <div class="panel-title">🃏 自動詞・他動詞<br>神経衰弱</div>

    <div class="ctrl-group">
      <span class="ctrl-label">カード枚数</span>
      <div class="btn-row" id="count-btns">
        <button class="btn-count" onclick="setCount(4)">4枚</button>
        <button class="btn-count active" onclick="setCount(8)">8枚</button>
        <button class="btn-count" onclick="setCount(12)">12枚</button>
        <button class="btn-count" onclick="setCount(16)">16枚</button>
        <button class="btn-count" onclick="setCount(20)">20枚</button>
        <button class="btn-count" onclick="setCount(24)">24枚</button>
      </div>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label">モード</span>
      <div class="btn-row">
        <button class="btn-mode active-solo" id="btn-solo" onclick="setMode('solo')">👤 1人</button>
        <button class="btn-mode" id="btn-team" onclick="setMode('team')">🔴 vs 🔵</button>
      </div>
    </div>

    <hr class="divider">

    <div class="ctrl-group">
      <span class="ctrl-label">カード幅</span>
      <div class="slider-row">
        <input type="range" min="90" max="320" value="200" id="sl-w" oninput="updateCard()">
        <span class="slider-val" id="val-w">200</span>
      </div>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">カード高さ</span>
      <div class="slider-row">
        <input type="range" min="70" max="260" value="140" id="sl-h" oninput="updateCard()">
        <span class="slider-val" id="val-h">140</span>
      </div>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">文字サイズ</span>
      <div class="slider-row">
        <input type="range" min="12" max="56" value="30" id="sl-f" oninput="updateCard()">
        <span class="slider-val" id="val-f">30</span>
      </div>
    </div>

    <hr class="divider">

    <div class="ctrl-group">
      <span class="ctrl-label">ラベル表示</span>
      <label class="switch-wrap">
        <span>自動詞・他動詞</span>
        <label class="switch">
          <input type="checkbox" id="toggle-label" checked onchange="toggleLabel()">
          <span class="slider-sw"></span>
        </label>
      </label>
    </div>

    <hr class="divider">

    <button class="btn-wide btn-reset" onclick="resetGame()">🔀 リセット</button>
    <button class="btn-wide btn-fs" onclick="toggleFS()">⛶ 全画面</button>
    <button class="btn-wide btn-student" onclick="openStudentWindow()">📺 生徒画面を開く</button>
  </div>

  <div class="right-panel">
    <h1>🃏 自動詞・他動詞 神経衰弱</h1>
    <div class="scoreboard" id="scoreboard-t"></div>
    <div class="grid"       id="grid-t"></div>
  </div>
</div>

<!-- 生徒画面 -->
<div class="student-layout" id="student-layout" style="display:none">
  <div class="scoreboard" id="scoreboard-s"></div>
  <div class="grid"       id="grid-s"></div>
</div>

<!-- 結果オーバーレイ -->
<div class="overlay" id="overlay">
  <div class="result-box">
    <div class="result-title"  id="result-title">🎉 おわり！</div>
    <div class="result-detail" id="result-detail"></div>
    <button class="btn-play-again" onclick="resetGame();document.getElementById('overlay').classList.remove('show')">もう一度！</button>
  </div>
</div>

<script>
const isStudent = new URLSearchParams(location.search).has('student');
const ch = new BroadcastChannel('jidoshi_game');

const ALL_PAIRS = [
  { jido:'<ruby>開<rt>あ</rt></ruby>きます',       tado:'<ruby>開<rt>あ</rt></ruby>けます' },
  { jido:'<ruby>閉<rt>し</rt></ruby>まります',     tado:'<ruby>閉<rt>し</rt></ruby>めます' },
  { jido:'<ruby>消<rt>き</rt></ruby>えます',       tado:'<ruby>消<rt>け</rt></ruby>します' },
  { jido:'<ruby>止<rt>と</rt></ruby>まります',     tado:'<ruby>止<rt>と</rt></ruby>めます' },
  { jido:'つきます',                               tado:'つけます' },
  { jido:'<ruby>入<rt>はい</rt></ruby>ります',     tado:'<ruby>入<rt>い</rt></ruby>れます' },
  { jido:'<ruby>出<rt>で</rt></ruby>ます',         tado:'<ruby>出<rt>だ</rt></ruby>します' },
  { jido:'<ruby>売<rt>う</rt></ruby>れます',       tado:'<ruby>売<rt>う</rt></ruby>ります' },
  { jido:'<ruby>見<rt>み</rt></ruby>えます',       tado:'<ruby>見<rt>み</rt></ruby>ます' },
  { jido:'<ruby>聞<rt>き</rt></ruby>こえます',     tado:'<ruby>聞<rt>き</rt></ruby>きます' },
  { jido:'<ruby>片付<rt>かたづ</rt></ruby>きます', tado:'<ruby>片付<rt>かたづ</rt></ruby>けます' },
  { jido:'<ruby>掛<rt>か</rt></ruby>かります',     tado:'<ruby>掛<rt>か</rt></ruby>けます' },
];

let cardCount=8, mode='solo', currentTeam='red';
let scores={solo:0,red:0,blue:0};
let flipped=[], matched=[], locked=false, cards=[];
let showLabel=true;

// ===== 同期 =====
ch.onmessage = e => {
  if (isStudent) {
    if (e.data === 'request') return;
    applyState(e.data);
  } else {
    if (e.data === 'request') broadcastState();
  }
};

function broadcastState() {
  const slW = document.getElementById('sl-w');
  const slH = document.getElementById('sl-h');
  const slF = document.getElementById('sl-f');
  ch.postMessage({ cards, scores, flipped, matched, mode, currentTeam, showLabel,
    cardW: slW ? slW.value : '200',
    cardH: slH ? slH.value : '140',
    fontF: slF ? slF.value : '30'
  });
}

function applyState(s) {
  cards=s.cards; scores=s.scores; flipped=s.flipped; matched=s.matched;
  mode=s.mode; currentTeam=s.currentTeam; showLabel=s.showLabel;
  const root = document.documentElement;
  if (s.cardW) root.style.setProperty('--card-w', s.cardW+'px');
  if (s.cardH) root.style.setProperty('--card-h', s.cardH+'px');
  if (s.fontF) root.style.setProperty('--font-size', s.fontF+'px');
  renderScoreboard('s');
  renderGrid('s');
}

// ===== 初期化 =====
document.addEventListener('DOMContentLoaded', () => {
  if (isStudent) {
    document.getElementById('student-layout').style.display = 'flex';
    ch.postMessage('request');
    // 先生画面からの応答がない場合、1秒後に再リクエスト
    setTimeout(() => { if (!cards.length) ch.postMessage('request'); }, 1000);
    setTimeout(() => { if (!cards.length) ch.postMessage('request'); }, 3000);
  } else {
    document.getElementById('teacher-layout').style.display = 'flex';
    resetGame();
  }
});

function openStudentWindow() {
  const url = location.href.split('?')[0] + '?student';
  window.open(url, '_blank');
  setTimeout(broadcastState, 800);
}

// ===== コントロール =====
function setCount(n) {
  cardCount = n;
  document.querySelectorAll('.btn-count').forEach(b => b.classList.toggle('active', b.textContent === n+'枚'));
  resetGame();
}
function setMode(m) {
  mode=m; currentTeam='red';
  document.getElementById('btn-solo').className = 'btn-mode'+(m==='solo'?' active-solo':'');
  document.getElementById('btn-team').className = 'btn-mode'+(m==='team'?' active-red':'');
  resetGame();
}
function updateCard() {
  const w=document.getElementById('sl-w').value, h=document.getElementById('sl-h').value, f=document.getElementById('sl-f').value;
  document.getElementById('val-w').textContent=w;
  document.getElementById('val-h').textContent=h;
  document.getElementById('val-f').textContent=f;
  document.documentElement.style.setProperty('--card-w',w+'px');
  document.documentElement.style.setProperty('--card-h',h+'px');
  document.documentElement.style.setProperty('--font-size',f+'px');
  broadcastState();
}
function toggleFS() {
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}
function toggleLabel() {
  showLabel=document.getElementById('toggle-label').checked;
  document.querySelectorAll('.card-type').forEach(el=>el.classList.toggle('hidden-label',!showLabel));
  broadcastState();
}

// ===== ゲーム =====
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function resetGame() {
  flipped=[];matched=[];locked=false;scores={solo:0,red:0,blue:0};currentTeam='red';
  setMsg('カードをめくってね！');
  document.getElementById('overlay').classList.remove('show');
  const chosen=shuffle([...ALL_PAIRS]).slice(0,Math.min(cardCount/2,ALL_PAIRS.length));
  cards=[];
  chosen.forEach((p,i)=>{
    cards.push({id:i*2,  pairId:i,type:'jido',word:p.jido,mc:''});
    cards.push({id:i*2+1,pairId:i,type:'tado',word:p.tado,mc:''});
  });
  shuffle(cards);
  renderScoreboard('t'); renderGrid('t');
  broadcastState();
}

function setMsg(txt){ const el=document.getElementById('message-t'); if(el) el.textContent=txt; }

function renderScoreboard(side){
  const sb=document.getElementById('scoreboard-'+side); if(!sb)return;
  if(mode==='solo'){
    sb.innerHTML=`<div class="score-box solo"><div class="score-name">スコア</div><div class="score-num" id="score-solo-${side}">${scores.solo}</div><div class="turn-label">ペア</div></div>`;
  } else {
    sb.innerHTML=`
      <div class="score-box team-red ${currentTeam==='red'?'current-turn':''}" id="box-red-${side}">
        <div class="score-name">🔴 赤チーム</div>
        <div class="score-num">${scores.red}</div>
        <div class="turn-label">${currentTeam==='red'?'← ターン':''}</div>
      </div>
      <div class="score-box team-blue ${currentTeam==='blue'?'current-turn':''}" id="box-blue-${side}">
        <div class="score-name">🔵 青チーム</div>
        <div class="score-num">${scores.blue}</div>
        <div class="turn-label">${currentTeam==='blue'?'← ターン':''}</div>
      </div>`;
  }
}

function getBestCols(n) {
  if (n <= 4)  return 2;
  if (n <= 8)  return 4;
  if (n <= 12) return 4;
  if (n <= 16) return 4;
  if (n <= 20) return 5;
  return 6;
}

function renderGrid(side){
  const grid=document.getElementById('grid-'+side); if(!grid)return;
  const cols = getBestCols(cards.length);
  grid.style.gridTemplateColumns = `repeat(${cols}, var(--card-w))`;
  const ro=(side==='s');
  grid.innerHTML='';
  cards.forEach((card, idx)=>{
    const wrap=document.createElement('div');
    let cls='card-wrap';
    if(flipped.includes(card.id)||matched.includes(card.id)) cls+=' flipped';
    if(matched.includes(card.id)) cls+=' '+(card.mc||'matched');
    if(ro) cls+=' readonly';
    wrap.className=cls; wrap.dataset.id=card.id;
    wrap.innerHTML=`<div class="card-inner">
      <div class="card-face card-back-face">
        <span class="card-num">${idx+1}</span>
      </div>
      <div class="card-face card-front-face ${card.type}">
        <div class="card-type${showLabel?'':' hidden-label'}">${card.type==='jido'?'自動詞':'他動詞'}</div>
        <div class="card-word">${card.word}</div>
      </div></div>`;
    if(!ro) wrap.addEventListener('click',()=>flipCard(card.id));
    grid.appendChild(wrap);
  });
}

function flipCard(id){
  if(locked||flipped.includes(id)||matched.includes(id))return;
  document.querySelector(`#grid-t .card-wrap[data-id="${id}"]`)?.classList.add('flipped');
  flipped.push(id);
  broadcastState();
  if(flipped.length===2){locked=true;setTimeout(checkMatch,700);}
}

function checkMatch(){
  const [id1,id2]=flipped;
  const c1=cards.find(c=>c.id===id1), c2=cards.find(c=>c.id===id2);
  if(c1.pairId===c2.pairId&&c1.type!==c2.type){
    matched.push(id1,id2);
    const mc=mode==='team'?'matched-'+currentTeam:'matched';
    c1.mc=mc; c2.mc=mc;
    [id1,id2].forEach(id=>{
      const w=document.querySelector(`#grid-t .card-wrap[data-id="${id}"]`);
      if(w){w.classList.add(mc);w.style.cursor='default';}
    });
    if(mode==='solo'){scores.solo++;setMsg('✅ せいかい！');}
    else{scores[currentTeam]++;setMsg((currentTeam==='red'?'🔴 赤':'🔵 青')+'チームのポイント！もう一回！');renderScoreboard('t');}
    flipped=[];locked=false;
    broadcastState();
    if(matched.length===cards.length)setTimeout(showResult,500);
  } else {
    setMsg('❌ ちがいます…');
    [id1,id2].forEach(id=>{
      const w=document.querySelector(`#grid-t .card-wrap[data-id="${id}"]`);
      if(w){w.classList.add('shake');setTimeout(()=>w.classList.remove('flipped','shake'),600);}
    });
    if(mode==='team'){
      currentTeam=currentTeam==='red'?'blue':'red';
      setMsg('❌ ちがいます… '+(currentTeam==='red'?'🔴 赤':'🔵 青')+'チームのターン！');
      document.getElementById('btn-team').className='btn-mode active-'+currentTeam;
      renderScoreboard('t');
    }
    flipped=[];
    setTimeout(()=>{locked=false;broadcastState();if(matched.length<cards.length)setMsg('カードをめくってね！');},800);
  }
}

function showResult(){
  document.getElementById('overlay').classList.add('show');
  const t=document.getElementById('result-title'),d=document.getElementById('result-detail');
  if(mode==='solo'){t.textContent='🎉 クリア！';d.innerHTML=`スコア：<strong>${scores.solo}</strong>ペア<br>全部そろえました！`;}
  else{
    const w=scores.red>scores.blue?'🔴 赤チーム':scores.blue>scores.red?'🔵 青チーム':null;
    t.textContent=w?`${w} の勝ち！🏆`:'🤝 引き分け！';
    d.innerHTML=`🔴 赤：<strong>${scores.red}</strong>ペア　🔵 青：<strong>${scores.blue}</strong>ペア`;
  }
  broadcastState();
}
</script>
</body>
</html>
