<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自動詞・他動詞 神経衰弱</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap');

:root {
  --cw: 160px;
  --ch: 110px;
  --cf: 24px;
  --cscore: 80px;
  --bg: #eef1fb;
  --navy: #1a237e;
  --indigo: #3949ab;
  --indigo2: #5c6bc0;
  --red: #e53935;
  --blue: #1e88e5;
  --green: #43a047;
  --gold: #f9a825;
  --shadow: 0 4px 18px rgba(0,0,0,0.13);
  --r: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); min-height: 100vh; }

/* ===== 先生レイアウト ===== */
#teacher { display: flex; min-height: 100vh; }

/* 左パネル */
#panel {
  width: 260px; min-width: 260px; max-width: 260px;
  background: var(--navy);
  display: flex; flex-direction: column;
  padding: 12px; gap: 10px;
  overflow-y: auto; flex-shrink: 0;
}

.ptitle {
  font-family: 'Kaisei Decol', serif;
  font-size: 15px; color: #c5cae9;
  text-align: center; padding-bottom: 9px;
  border-bottom: 1px solid var(--indigo);
}

.plabel { font-size: 10px; color: #7986cb; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.prow   { display: flex; flex-wrap: wrap; gap: 4px; }
.phr    { border: none; border-top: 1px solid var(--indigo); margin: 0; }
.psl    { display: flex; align-items: center; gap: 6px; }
.psl input[type=range] { flex: 1; accent-color: var(--indigo2); }
.psl span { font-size: 12px; color: #7986cb; width: 28px; text-align: right; }

/* パネルボタン */
button { font-family: 'Noto Sans JP', sans-serif; border: none; cursor: pointer; font-weight: 700; transition: .15s; }
.bcnt { background: var(--indigo); color: #c5cae9; padding: 5px 10px; font-size: 12px; border-radius: 6px; }
.bcnt.on { background: var(--indigo2); color: #fff; }
.bmode { padding: 7px 6px; font-size: 12px; border-radius: 6px; background: var(--indigo); color: #c5cae9; flex: 1; }
.bmode.solo { background: var(--green); color: #fff; }
.bmode.red  { background: var(--red);   color: #fff; }
.bmode.blue { background: var(--blue);  color: #fff; }

.pbtns { display: flex; gap: 5px; }
.pbtns button { flex: 1; padding: 8px 2px; font-size: 12px; border-radius: 6px; }
.b-reset { background: #ff7043; color: #fff; }
.b-fs    { background: var(--indigo2); color: #fff; }
.b-student { width: 100%; padding: 9px; font-size: 13px; border-radius: 6px; background: var(--gold); color: var(--navy); font-weight: 900; }

.sw-row { display: flex; align-items: center; justify-content: space-between; }
.sw-row > span { font-size: 12px; color: #c5cae9; }
.sw { position: relative; width: 38px; height: 20px; flex-shrink: 0; }
.sw input { display: none; }
.sw-sl { position: absolute; inset: 0; background: var(--indigo); border-radius: 20px; cursor: pointer; transition: .3s; }
.sw-sl::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .3s; }
.sw input:checked + .sw-sl { background: var(--indigo2); }
.sw input:checked + .sw-sl::before { transform: translateX(18px); }

/* 右盤面 */
#board { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px; overflow-y: auto; min-width: 0; }

/* ===== 生徒レイアウト ===== */
#student { display: flex; flex-direction: column; align-items: center; padding: 20px 16px; min-height: 100vh; }

/* ===== スコア ===== */
.scoreboard { display: flex; gap: 16px; margin-bottom: 14px; justify-content: center; }

/* 先生スコア（小さめ） */
.sc-box {
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow);
  padding: 8px 16px; text-align: center;
  min-width: 85px;
  border: 3px solid transparent; transition: border-color .3s;
}
.sc-box.cur { border-color: var(--gold); box-shadow: 0 0 12px rgba(249,168,37,.4); }
.sc-name { font-size: 12px; font-weight: 700; }
.sc-num  { font-size: 26px; font-weight: 900; line-height: 1.1; }
.sc-turn { font-size: 10px; color: #999; }
.sc-box.solo  .sc-name, .sc-box.solo  .sc-num { color: var(--green); }
.sc-box.t-red  .sc-name, .sc-box.t-red  .sc-num { color: var(--red); }
.sc-box.t-blue .sc-name, .sc-box.t-blue .sc-num { color: var(--blue); }

/* 生徒スコア（大きめ・カードサイズ連動） */
#student .sc-box {
  padding: calc(var(--cscore) * .18) calc(var(--cscore) * .4);
  min-width: calc(var(--cscore) * 2.2);
  border-radius: 18px; border-width: 4px;
}
#student .sc-name { font-size: calc(var(--cscore) * .28); }
#student .sc-num  { font-size: var(--cscore); line-height: 1; }
#student .sc-turn { font-size: calc(var(--cscore) * .18); }
#student .scoreboard { gap: calc(var(--cscore) * .4); margin-bottom: calc(var(--cscore) * .3); }

/* ===== グリッド ===== */
.grid { display: grid; gap: 10px; justify-content: center; }

/* ===== カード ===== */
.card { width: var(--cw); height: var(--ch); perspective: 900px; cursor: pointer; }
.card.ro { cursor: default; }

.ci {
  width: 100%; height: 100%;
  position: relative; transform-style: preserve-3d;
  transition: transform .45s cubic-bezier(.4,0,.2,1);
  border-radius: var(--r);
}
.card.fp .ci, .card.mp .ci,
.card.mr .ci, .card.mb .ci { transform: rotateY(180deg); }

.cf {
  position: absolute; width: 100%; height: 100%;
  border-radius: var(--r); backface-visibility: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  box-shadow: var(--shadow); user-select: none;
}

/* 裏面：番号のみ大きく */
.back {
  background: #3949ab;
  font-size: calc(var(--ch) * .55);
  font-weight: 900; color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,.35);
}

/* 表面 */
.front {
  background: #fff; transform: rotateY(180deg);
  border: 2px solid #e0e0e0;
  justify-content: flex-start;
  padding: 8px 4px 6px;
  gap: 0;
}
.card.mp .front { background: #e8f5e9; border-color: var(--green); }
.card.mr .front { background: #ffebee; border-color: var(--red); }
.card.mb .front { background: #e3f2fd; border-color: var(--blue); }

.clabel {
  font-size: calc(var(--ch) * .13);
  font-weight: 700; padding: 1px 8px; border-radius: 5px;
  margin-bottom: 4px; flex-shrink: 0;
}
.clabel.hi { visibility: hidden; }
.jido .clabel { background: #e3f2fd; color: var(--blue); }
.tado .clabel { background: #fce4ec; color: var(--red); }

.cword {
  flex: 1; display: flex;
  align-items: flex-end; justify-content: center;
  padding-bottom: 5px;
  font-size: var(--cf); font-weight: 700; color: #1a1a2e;
  text-align: center; line-height: 1.3; width: 100%;
}

ruby { ruby-align: center; vertical-align: bottom; }
rt   { font-size: .45em; color: #888; }

/* ===== アニメ ===== */
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
.shake { animation: shake .3s ease; }

/* ===== 結果オーバーレイ ===== */
.ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:100; align-items:center; justify-content:center; }
.ov.show { display:flex; }
.ov-box { background:#fff; border-radius:20px; padding:36px 44px; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,.3); animation:pop .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes pop { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
.ov-title  { font-family:'Kaisei Decol',serif; font-size:30px; color:var(--navy); margin-bottom:8px; }
.ov-detail { font-size:15px; color:#555; margin-bottom:18px; line-height:1.8; }
.b-again { background:var(--indigo); color:#fff; padding:10px 26px; font-size:14px; border-radius:10px; font-family:'Noto Sans JP',sans-serif; font-weight:700; }
</style>
</head>
<body>

<!-- ===== 先生画面 ===== -->
<div id="teacher" style="display:none">

  <!-- 左パネル -->
  <div id="panel">
    <div class="ptitle">🃏 自動詞・他動詞<br>神経衰弱</div>

    <div>
      <div class="plabel">カード枚数</div>
      <div class="prow" id="cnt-btns">
        <button class="bcnt" onclick="setN(4)">4枚</button>
        <button class="bcnt on" onclick="setN(8)">8枚</button>
        <button class="bcnt" onclick="setN(12)">12枚</button>
        <button class="bcnt" onclick="setN(16)">16枚</button>
        <button class="bcnt" onclick="setN(20)">20枚</button>
        <button class="bcnt" onclick="setN(24)">24枚</button>
      </div>
    </div>

    <div>
      <div class="plabel">モード</div>
      <div class="prow">
        <button class="bmode solo" id="bsolo" onclick="setMode('solo')">👤 1人</button>
        <button class="bmode"      id="bteam" onclick="setMode('team')">🔴 vs 🔵</button>
      </div>
    </div>

    <hr class="phr">

    <div>
      <div class="plabel">カード幅</div>
      <div class="psl">
        <input type="range" min="100" max="300" value="160" id="sl-cw" oninput="upd()">
        <span id="v-cw">160</span>
      </div>
    </div>

    <div>
      <div class="plabel">カード高さ</div>
      <div class="psl">
        <input type="range" min="70" max="240" value="110" id="sl-ch" oninput="upd()">
        <span id="v-ch">110</span>
      </div>
    </div>

    <div>
      <div class="plabel">カード文字サイズ</div>
      <div class="psl">
        <input type="range" min="12" max="52" value="24" id="sl-cf" oninput="upd()">
        <span id="v-cf">24</span>
      </div>
    </div>

    <div>
      <div class="plabel">スコア文字サイズ</div>
      <div class="psl">
        <input type="range" min="40" max="200" value="80" id="sl-cs" oninput="upd()">
        <span id="v-cs">80</span>
      </div>
    </div>

    <hr class="phr">

    <div>
      <div class="plabel">ラベル表示</div>
      <label class="sw-row">
        <span>自動詞・他動詞</span>
        <label class="sw">
          <input type="checkbox" id="tgl" checked onchange="togLabel()">
          <span class="sw-sl"></span>
        </label>
      </label>
    </div>

    <hr class="phr">

    <div class="pbtns">
      <button class="b-reset" onclick="reset()">🔀 リセット</button>
      <button class="b-fs"    onclick="goFS()">⛶ 全画面</button>
    </div>
    <button class="b-student" onclick="openS()">📺 生徒画面を開く</button>

  </div><!-- /panel -->

  <!-- 右盤面 -->
  <div id="board">
    <div class="scoreboard" id="sb-t"></div>
    <div class="grid"       id="g-t"></div>
  </div>

</div><!-- /teacher -->

<!-- ===== 生徒画面 ===== -->
<div id="student" style="display:none">
  <div class="scoreboard" id="sb-s"></div>
  <div class="grid"       id="g-s"></div>
</div>

<!-- ===== 結果 ===== -->
<div class="ov" id="ov">
  <div class="ov-box">
    <div class="ov-title"  id="ov-t">🎉 おわり！</div>
    <div class="ov-detail" id="ov-d"></div>
    <button class="b-again" onclick="reset();document.getElementById('ov').classList.remove('show')">もう一度！</button>
  </div>
</div>

<script>
// ===== 定数 =====
const PAIRS = [
  { j:'<ruby>開<rt>あ</rt></ruby>きます',       t:'<ruby>開<rt>あ</rt></ruby>けます' },
  { j:'<ruby>閉<rt>し</rt></ruby>まります',     t:'<ruby>閉<rt>し</rt></ruby>めます' },
  { j:'<ruby>消<rt>き</rt></ruby>えます',       t:'<ruby>消<rt>け</rt></ruby>します' },
  { j:'<ruby>止<rt>と</rt></ruby>まります',     t:'<ruby>止<rt>と</rt></ruby>めます' },
  { j:'つきます',                               t:'つけます' },
  { j:'<ruby>入<rt>はい</rt></ruby>ります',     t:'<ruby>入<rt>い</rt></ruby>れます' },
  { j:'<ruby>出<rt>で</rt></ruby>ます',         t:'<ruby>出<rt>だ</rt></ruby>します' },
  { j:'<ruby>売<rt>う</rt></ruby>れます',       t:'<ruby>売<rt>う</rt></ruby>ります' },
  { j:'<ruby>見<rt>み</rt></ruby>えます',       t:'<ruby>見<rt>み</rt></ruby>ます' },
  { j:'<ruby>聞<rt>き</rt></ruby>こえます',     t:'<ruby>聞<rt>き</rt></ruby>きます' },
  { j:'<ruby>片付<rt>かたづ</rt></ruby>きます', t:'<ruby>片付<rt>かたづ</rt></ruby>けます' },
  { j:'<ruby>掛<rt>か</rt></ruby>かります',     t:'<ruby>掛<rt>か</rt></ruby>けます' },
];
const COLS = {4:2, 8:4, 12:4, 16:4, 20:5, 24:6};

// ===== モード判定 =====
const isS = new URLSearchParams(location.search).has('student');
const bc  = new BroadcastChannel('jg3');

// ===== 状態 =====
let N=8, mode='solo', team='red';
let score={solo:0,red:0,blue:0};
let flipped=[], matched=[], locked=false, cards=[];
let showLbl=true;
let vcw=160, vch=110, vcf=24, vcs=80;

// ===== 同期 =====
bc.onmessage = e => {
  if (isS) {
    if (e.data === 'req') return;
    recv(e.data);
  } else {
    if (e.data === 'req') send();
  }
};

function send() {
  bc.postMessage({ cards, score, flipped, matched, mode, team, showLbl, vcw, vch, vcf, vcs });
}

function recv(s) {
  cards=s.cards; score=s.score; flipped=s.flipped; matched=s.matched;
  mode=s.mode; team=s.team; showLbl=s.showLbl;
  applyCSS(s.vcw, s.vch, s.vcf, s.vcs);
  renderSB('s'); renderGrid('s');
}

function applyCSS(cw, ch, cf, cs) {
  const r = document.documentElement.style;
  r.setProperty('--cw', cw+'px');
  r.setProperty('--ch', ch+'px');
  r.setProperty('--cf', cf+'px');
  r.setProperty('--cscore', cs+'px');
}

// ===== 起動 =====
document.addEventListener('DOMContentLoaded', () => {
  if (isS) {
    document.getElementById('student').style.display = 'flex';
    bc.postMessage('req');
  } else {
    document.getElementById('teacher').style.display = 'flex';
    reset();
  }
});

function openS() {
  window.open(location.href.split('?')[0]+'?student', '_blank');
  setTimeout(send, 800);
}

// ===== コントロール =====
function setN(n) {
  N = n;
  document.querySelectorAll('.bcnt').forEach(b => b.classList.toggle('on', b.textContent===n+'枚'));
  reset();
}

function setMode(m) {
  mode=m; team='red';
  document.getElementById('bsolo').className = 'bmode'+(m==='solo'?' solo':'');
  document.getElementById('bteam').className = 'bmode'+(m==='team'?' red':'');
  reset();
}

function upd() {
  vcw = +document.getElementById('sl-cw').value;
  vch = +document.getElementById('sl-ch').value;
  vcf = +document.getElementById('sl-cf').value;
  vcs = +document.getElementById('sl-cs').value;
  document.getElementById('v-cw').textContent = vcw;
  document.getElementById('v-ch').textContent = vch;
  document.getElementById('v-cf').textContent = vcf;
  document.getElementById('v-cs').textContent = vcs;
  applyCSS(vcw, vch, vcf, vcs);
  renderGrid('t');
  send();
}

function goFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

function togLabel() {
  showLbl = document.getElementById('tgl').checked;
  document.querySelectorAll('.clabel').forEach(el => el.classList.toggle('hi', !showLbl));
  send();
}

// ===== ゲーム =====
function shuf(a) {
  for (let i=a.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function reset() {
  flipped=[]; matched=[]; locked=false;
  score={solo:0,red:0,blue:0}; team='red';
  document.getElementById('ov').classList.remove('show');

  const chosen = shuf([...PAIRS]).slice(0, Math.min(N/2, PAIRS.length));
  cards = [];
  chosen.forEach((p,i) => {
    cards.push({id:i*2,   pi:i, type:'jido', w:p.j, mc:''});
    cards.push({id:i*2+1, pi:i, type:'tado', w:p.t, mc:''});
  });
  shuf(cards);

  // スライダー値を読む
  vcw = +document.getElementById('sl-cw').value;
  vch = +document.getElementById('sl-ch').value;
  vcf = +document.getElementById('sl-cf').value;
  vcs = +document.getElementById('sl-cs').value;
  applyCSS(vcw, vch, vcf, vcs);

  renderSB('t');
  renderGrid('t');
  send();
}

function renderSB(side) {
  const sb = document.getElementById('sb-'+side);
  if (!sb) return;
  if (mode === 'solo') {
    sb.innerHTML = `<div class="sc-box solo">
      <div class="sc-name">スコア</div>
      <div class="sc-num">${score.solo}</div>
      <div class="sc-turn">ペア</div>
    </div>`;
  } else {
    sb.innerHTML = `
      <div class="sc-box t-red ${team==='red'?'cur':''}">
        <div class="sc-name">🔴 赤チーム</div>
        <div class="sc-num">${score.red}</div>
        <div class="sc-turn">${team==='red'?'← ターン':''}</div>
      </div>
      <div class="sc-box t-blue ${team==='blue'?'cur':''}">
        <div class="sc-name">🔵 青チーム</div>
        <div class="sc-num">${score.blue}</div>
        <div class="sc-turn">${team==='blue'?'← ターン':''}</div>
      </div>`;
  }
}

function renderGrid(side) {
  const g = document.getElementById('g-'+side);
  if (!g) return;
  const cols = COLS[cards.length] || Math.ceil(Math.sqrt(cards.length));
  g.style.gridTemplateColumns = `repeat(${cols}, var(--cw))`;
  const ro = (side === 's');
  g.innerHTML = '';
  cards.forEach((c, idx) => {
    const d = document.createElement('div');
    let cls = 'card';
    if (flipped.includes(c.id) || matched.includes(c.id)) cls += ' fp';
    if (matched.includes(c.id)) cls += ' ' + (c.mc || 'mp');
    if (ro) cls += ' ro';
    d.className = cls;
    d.dataset.id = c.id;
    d.innerHTML = `
      <div class="ci">
        <div class="cf back">${idx+1}</div>
        <div class="cf front ${c.type}">
          <div class="clabel${showLbl?'':' hi'}">${c.type==='jido'?'自動詞':'他動詞'}</div>
          <div class="cword">${c.w}</div>
        </div>
      </div>`;
    if (!ro) d.addEventListener('click', () => flip(c.id));
    g.appendChild(d);
  });
}

function flip(id) {
  if (locked || flipped.includes(id) || matched.includes(id)) return;
  document.querySelector(`#g-t .card[data-id="${id}"]`)?.classList.add('fp');
  flipped.push(id);
  send();
  if (flipped.length === 2) { locked = true; setTimeout(check, 700); }
}

function check() {
  const [a, b] = flipped;
  const ca = cards.find(c=>c.id===a);
  const cb = cards.find(c=>c.id===b);

  if (ca.pi === cb.pi && ca.type !== cb.type) {
    // 正解！
    matched.push(a, b);
    const mc = mode==='team' ? (team==='red' ? 'mr' : 'mb') : 'mp';
    ca.mc = mc; cb.mc = mc;
    [a, b].forEach(id => {
      const el = document.querySelector(`#g-t .card[data-id="${id}"]`);
      if (el) { el.classList.add(mc); el.style.cursor='default'; }
    });
    if (mode === 'solo') score.solo++;
    else { score[team]++; }
    flipped = []; locked = false;
    renderSB('t');
    send();
    if (matched.length === cards.length) setTimeout(showRes, 500);
  } else {
    // 不正解
    [a, b].forEach(id => {
      const el = document.querySelector(`#g-t .card[data-id="${id}"]`);
      if (el) {
        el.classList.add('shake');
        setTimeout(() => el.classList.remove('fp', 'shake'), 620);
      }
    });
    if (mode === 'team') {
      team = team==='red' ? 'blue' : 'red';
      document.getElementById('bteam').className = 'bmode ' + team;
      renderSB('t');
    }
    flipped = [];
    setTimeout(() => { locked = false; send(); }, 820);
  }
}

function showRes() {
  document.getElementById('ov').classList.add('show');
  const t = document.getElementById('ov-t');
  const d = document.getElementById('ov-d');
  if (mode === 'solo') {
    t.textContent = '🎉 クリア！';
    d.innerHTML = `<strong>${score.solo}</strong>ペア！全部そろえました！`;
  } else {
    const w = score.red>score.blue ? '🔴 赤チーム' : score.blue>score.red ? '🔵 青チーム' : null;
    t.textContent = w ? `${w}の勝ち！🏆` : '🤝 引き分け！';
    d.innerHTML = `🔴 赤：<strong>${score.red}</strong>ペア　🔵 青：<strong>${score.blue}</strong>ペア`;
  }
  send();
}
</script>
</body>
</html>
